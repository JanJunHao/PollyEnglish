name: Polly

# 第三方依赖。WhisperKit 走 SPM，第一次 build 拉模型（默认 tiny ~ 80 MB；可换 base / small）。
# 模型在运行时 download 到 .documentDirectory，不进 bundle。
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.9.0

options:
  bundleIdPrefix: com.polly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "3Y8X58T6N8"
    CODE_SIGN_STYLE: Automatic

configFiles:
  Debug: Polly/Config/Generated.xcconfig
  Release: Polly/Config/Generated.xcconfig

targets:
  Polly:
    type: application
    platform: iOS
    sources:
      - path: Polly
        excludes:
          - "Config/Secrets.xcconfig"
          - "Config/Secrets.xcconfig.template"
          - "Config/Generated.xcconfig"

    dependencies:
      - package: WhisperKit

    info:
      path: Polly/Info.plist
      properties:
        CFBundleDisplayName: Polly
        UILaunchScreen:
          # 纯黑底过场，1 帧后由 SplashView 接管。
          # 早期用了 LaunchLogo PNG 容易出现白底+巨字+方框副标题，已弃用。
          UIColorName: LaunchBackground
          UIImageRespectsSafeAreaInsets: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        # 画中画 / 后台播放：PiP 必需。没有 audio 后台模式，App 进后台会立即暂停，无法出小窗。
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: Polly 需要访问麦克风以录制你的跟读发音
        # polly-server 地址 + 鉴权 Bearer token（来自 Secrets.xcconfig）
        PollyServerURL: $(POLLY_SERVER_URL)
        PollyAPIKey: $(POLLY_API_KEY)
        # ATS：dev 期允许本机 + LAN HTTP。
        # NSAllowsLocalNetworking 一口气放行 127.0.0.1 / localhost / RFC1918（192.168.x.x、10.x.x.x、172.16-31.x.x）
        # 和 link-local，省得换 Wi-Fi 后 LAN IP 变了又改 exception。
        # 上线 polly-server HTTPS 后整段删掉。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollyEnglish.app
        TARGETED_DEVICE_FAMILY: "1"   # 1 = iPhone only
        ENABLE_PREVIEWS: "YES"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
